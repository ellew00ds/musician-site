<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sterling Steffen · Musician · Austin, TX</title>
  <meta name="description" content="Sterling Steffen — musician based in Austin, Texas. Official site, links, and booking." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://sterlingsteffen.com/" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Sterling Steffen" />
  <meta property="og:description" content="Musician based in Austin, Texas. Official site and booking." />
  <meta property="og:url" content="https://sterlingsteffen.com/" />
  <meta property="og:locale" content="en_US" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Sterling Steffen" />
  <meta name="twitter:description" content="Musician based in Austin, Texas. Official site and booking." />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Syne:wght@500;700;800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: #0a0a0a;
      color: #e6e6e6;
      font-family: 'Syne', system-ui, sans-serif;
      font-size: 0.9375rem;
      line-height: 1.5;
    }

    main {
      text-align: center;
      max-width: 36rem;
    }

    /* Shrink-wraps to the title so it stays centered like a lone block; button is out of flow */
    .artist-anchor {
      position: relative;
      display: inline-block;
      width: fit-content;
      max-width: 100%;
    }

    .artist-name {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15em;
    }

    .artist-name__given {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(0.7rem, 2.2vw, 0.85rem);
      letter-spacing: 0.55em;
      text-transform: uppercase;
      text-indent: 0.55em;
      color: #5c5c5c;
    }

    .artist-name__family {
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(3.25rem, 14vw, 6.5rem);
      line-height: 0.92;
      letter-spacing: -0.02em;
      background: linear-gradient(165deg, #f5f5f5 0%, #a8a8a8 45%, #eaeaea 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 40px rgba(255, 255, 255, 0.06));
    }

    .tag {
      margin-top: 1.35rem;
      font-family: 'Syne', sans-serif;
      font-weight: 500;
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      text-indent: 0.35em;
      color: #4a4a4a;
    }

    .booking-cta {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.65em 1.6em;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.68rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      text-decoration: none;
      text-indent: 0.28em;
      color: #b0b0b0;
      border: 1px solid #3d3d3d;
      border-radius: 999px;
      transition: color 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .booking-cta:hover {
      color: #f0f0f0;
      border-color: #6a6a6a;
      background: rgba(255, 255, 255, 0.04);
    }

    footer {
      margin-top: 4rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1.75rem;
      justify-content: center;
      align-items: center;
    }

    .social {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.75rem;
      height: 2.75rem;
      color: #6a6a6a;
      text-decoration: none;
      border-radius: 50%;
      transition: color 180ms ease, background 180ms ease, transform 180ms ease;
    }

    .social:hover {
      color: #c8c8c8;
      background: rgba(255, 255, 255, 0.05);
    }

    .social:active {
      transform: scale(0.96);
    }

    .social svg {
      display: block;
      width: 1.35rem;
      height: 1.35rem;
      overflow: visible;
    }

    /* Out of document flow so the name centers as before; desktop: to the right of the name */
    .secret-hit {
      position: absolute;
      left: calc(100% + 50px);
      top: 50%;
      transform: translateY(-50%);
      width: 2.5rem;
      height: 2.5rem;
      border: none;
      border-radius: 4px;
      background: transparent;
      cursor: default;
      opacity: 0;
      transition: opacity 160ms ease, background 160ms ease;
    }

    @media (max-width: 560px) {
      .artist-anchor {
        padding-bottom: 2.75rem;
      }

      .secret-hit {
        left: 50%;
        top: calc(100% + 14px);
        transform: translateX(-50%);
      }
    }

    .secret-hit:hover {
      opacity: 1;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.06);
    }

    .secret-hit:focus-visible {
      opacity: 1;
      outline: 1px solid rgba(255, 255, 255, 0.35);
      outline-offset: 2px;
    }

    .secret-hit.is-playing:hover {
      background: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>
  <main>
    <div class="artist-anchor">
      <h1 class="artist-name">
        <span class="artist-name__given">Sterling</span>
        <span class="artist-name__family">Steffen</span>
      </h1>
      <audio id="secret-audio" src="hidden-tune.wav" preload="auto"></audio>
      <button
        type="button"
        class="secret-hit"
        id="secret-hit"
        aria-label="Play hidden audio"
        title=""
      ></button>
    </div>
    <p class="tag">Austin · TX</p>
    <a class="booking-cta" href="https://example.com/booking" target="_blank" rel="noopener noreferrer">Book</a>
  </main>

  <footer>
    <a class="social" href="#" target="_blank" rel="noopener" aria-label="Bandcamp">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M0 18.75l7.437-13.5H24l-7.438 13.5H0z" />
      </svg>
    </a>
    <a class="social" href="#" target="_blank" rel="noopener" aria-label="Tidal">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12.012 3.992L8.008 7.996 4.004 3.992 0 7.996 4.004 12l4.004-4.004L12.012 12l-4.004 4.004 4.004 4.004 4.004-4.004L12.012 12l4.004-4.004-4.004-4.004zM16.042 7.996l3.979-3.979L24 7.996l-3.979 3.979z" />
      </svg>
    </a>
    <a class="social" href="#" target="_blank" rel="noopener" aria-label="Mixcloud">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M2.462 8.596l1.372 6.49h.319l1.372-6.49h2.462v6.808H6.742v-5.68l.232-.81h-.402l-1.43 6.49H2.854l-1.44-6.49h-.391l.222.81v5.68H0V8.596zM24 8.63v1.429L21.257 12 24 13.941v1.43l-3.235-2.329h-.348l-3.226 2.329v-1.43l2.734-1.94-2.733-1.942V8.63l3.225 2.338h.348zm-7.869 2.75v1.24H9.304v-1.24z" />
      </svg>
    </a>
    <a class="social" href="mailto:booking@example.com" aria-label="Email">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="5" width="18" height="14" rx="2" />
        <path d="M3 7l9 6 9-6" />
      </svg>
    </a>
  </footer>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "MusicGroup",
    "name": "Sterling Steffen",
    "url": "https://sterlingsteffen.com/",
    "description": "Musician based in Austin, Texas.",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Austin",
      "addressRegion": "TX",
      "addressCountry": "US"
    }
  }
  </script>

  <script>
    (function () {
      var btn = document.getElementById('secret-hit');
      var audio = document.getElementById('secret-audio');
      if (!btn || !audio) return;

      var MAX_LOOPS = 3;
      var loopsDone = 0;

      function finishSession() {
        audio.pause();
        audio.currentTime = 0;
        loopsDone = 0;
        btn.classList.remove('is-playing');
        btn.setAttribute('aria-label', 'Play hidden audio');
      }

      audio.addEventListener('ended', function () {
        loopsDone++;
        if (loopsDone < MAX_LOOPS) {
          audio.currentTime = 0;
          audio.play().catch(function () {});
        } else {
          finishSession();
        }
      });

      btn.addEventListener('click', function () {
        if (audio.paused) {
          if (audio.ended || loopsDone >= MAX_LOOPS) {
            loopsDone = 0;
            audio.currentTime = 0;
          }
          audio.play().catch(function () {});
          btn.classList.add('is-playing');
          btn.setAttribute('aria-label', 'Pause hidden audio');
        } else {
          audio.pause();
          btn.classList.remove('is-playing');
          btn.setAttribute('aria-label', 'Play hidden audio');
        }
      });
    })();
  </script>
</body>
</html>
